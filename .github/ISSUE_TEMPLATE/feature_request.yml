name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case should this support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Safety boundary
      options:
        - label: This request can be implemented as read-only source retrieval or citation tooling.
        - label: This request would require workspace mutation or external regulatory action.
